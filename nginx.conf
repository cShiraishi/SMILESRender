server {
    listen 80;
    server_name _; # Replace with your domain (e.g., smilesrender.com)

    client_max_body_size 50M;

    location / {
        proxy_pass http://smiles-render-web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files if needed directly
    location /static/ {
        proxy_pass http://smiles-render-web:3000/static/;
    }
}
