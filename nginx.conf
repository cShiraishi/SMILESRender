# Docker internal DNS resolver — prevents stale IP cache on container restart
resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;
    server_name smilesrender.com www.smilesrender.com;

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt/;
    }

    location / {
        return 301 https://smilesrender.com$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.smilesrender.com;

    # SSL Config
    ssl_certificate /etc/letsencrypt/live/smilesrender.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smilesrender.com/privkey.pem;

    return 301 https://smilesrender.com$request_uri;
}

server {
    listen 443 ssl;
    server_name smilesrender.com;

    # SSL Config
    ssl_certificate /etc/letsencrypt/live/smilesrender.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smilesrender.com/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://chemistry:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for docking (10 min)
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /static/ {
        proxy_pass http://chemistry:3000/static/;
    }
}
