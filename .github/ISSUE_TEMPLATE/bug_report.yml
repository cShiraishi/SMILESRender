name: Bug Report
description: Report a bug or unexpected behavior in SmileRender
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill in as much detail as possible to help us reproduce and fix it.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of SmileRender is affected?
      options:
        - Structure Rendering (SMILES → image)
        - ADMET Profiling
        - Molecular Descriptors
        - Similarity Search
        - IUPAC Nomenclature
        - Reaction Visualization
        - Peptide Engineering
        - Molecular Docking
        - CSV/Batch Processing
        - Docker / Deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear description of what went wrong.
      placeholder: "When I input SMILES '...' and click render, I get..."
    validations:
      required: true

  - type: textarea
    id: smiles
    attributes:
      label: SMILES or Input Data
      description: Paste the SMILES string or input that triggered the bug.
      render: text

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages.

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Public instance (smiles-render.onrender.com)
        - Docker Compose (local)
        - Local dev (python src/main.py)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / Commit
      placeholder: "v2.0.0 or git SHA"

  - type: textarea
    id: environment
    attributes:
      label: Environment
      render: text
      placeholder: |
        OS: Ubuntu 22.04 / Windows 11
        Browser: Chrome 125
        Python: 3.12.7
        Docker: 26.1

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste server logs or browser console errors here.
      render: text

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I am using a supported version (Python ≥ 3.12)
          required: true
