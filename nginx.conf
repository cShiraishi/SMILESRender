server {
    listen 80;
    server_name _; # Replace with your domain (e.g., smilesrender.com)

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt/;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _; # Replace with your domain

    # SSL Config (Paths for Certbot)
    # ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://smiles-render-web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files if needed directly
    location /static/ {
        proxy_pass http://smiles-render-web:3000/static/;
    }
}
