site_name: SmileRender
site_description: Unified open-source cheminformatics platform
site_url: https://shiraishicarlos.github.io/smilesrender
repo_url: https://github.com/shiraishicarlos/smilesrender
repo_name: shiraishicarlos/smilesrender
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Docker Quickstart: getting-started/docker.md
      - Local Development: getting-started/local-dev.md
  - Tools:
      - Structure Rendering: tools/rendering.md
      - ADMET Profiling: tools/admet.md
      - Molecular Descriptors: tools/descriptors.md
      - Similarity Search: tools/similarity.md
      - IUPAC Nomenclature: tools/iupac.md
      - Molecular Docking: tools/docking.md
      - Peptide Engineering: tools/peptide.md
  - API Reference:
      - Endpoints: api/endpoints.md
      - Python SDK: api/python.md
  - Contributing: contributing.md
  - Changelog: CHANGELOG.md
  - Citation: citation.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/shiraishicarlos/smilesrender
  version:
    provider: mike
