name: Feature Request
description: Suggest a new feature or enhancement for SmileRender
title: "[Feature]: "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve SmileRender? We'd love to hear it!

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New prediction engine / ADMET tool
        - New molecular property
        - UI / UX improvement
        - API endpoint
        - Batch / CSV processing
        - Docking / 3D visualization
        - Export format
        - Performance
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve? Link related issues if any.
      placeholder: "I often need to... but currently I have to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative tools you've tried?

  - type: dropdown
    id: priority
    attributes:
      label: Priority (your estimate)
      options:
        - Low — nice to have
        - Medium — would significantly improve my workflow
        - High — blocking my research
    validations:
      required: true

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I would like to implement this feature myself (with guidance)
        - label: I can provide test data / validation molecules

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this has not been requested before
          required: true
